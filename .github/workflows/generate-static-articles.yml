name: Generate Static Content

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "prompts/**"
      - "scripts/generate_static_articles.py"
      - ".github/workflows/generate-static-articles.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate static articles
        run: python3 scripts/generate_static_articles.py

      - name: Commit and push generated output
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content prompts articles projects articles.html projects.html assets/data

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: regenerate static pages and chat context [skip ci]"
          git push
